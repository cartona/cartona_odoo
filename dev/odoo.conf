[options]
addons_path = /mnt/extra-addons,/mnt/extra-addons/cartona_odoo/addons,/usr/lib/python3/dist-packages/odoo/addons
admin_passwd = admin
db_host = db
db_user = odoo
db_password = odoo
db_name = cartona_dev
db_filter = ^cartona_dev$
list_db = False
; Single-process mode for local Docker: websockets/push notifications work on 8069.
; queue_job still runs via its threaded jobrunner (workers=0 uses ThreadedServer).
workers = 0
server_wide_modules = web,queue_job

[queue_job]
channels = root:1,cartona:1
